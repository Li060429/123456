<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长川遗韵 - 内蒙古非遗数字图谱</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #f7f9f4; /* 配合背景图的浅青白底色 */
            --ink: #2b3a42;      /* 深墨绿灰，比纯黑更雅致 */
            --accent: #8e2b2b;   /* 朱砂红，用于强调 */
            
            /* 类别颜色 */
            --c-lit: #8e44ad; --c-music: #2980b9; --c-dance: #d35400; 
            --c-drama: #c0392b; --c-quyi: #f39c12; --c-sport: #27ae60; 
            --c-art: #e74c3c; --c-craft: #a04000; --c-med: #16a085; --c-folk: #2c3e50;

            /* 民族颜色 */
            --e-mongol: #c0392b; --e-han: #d35400; --e-ewenki: #27ae60; 
            --e-daur: #f39c12; --e-oroqen: #8e44ad; --e-russian: #2980b9;
            --e-multi: #7f8c8d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ====== 1. 背景与全局设置 ====== */
        body {
            font-family: 'Noto Serif SC', serif;
            
            /* 【修改这里】确保括号里的名字和您的图片文件名一模一样！包含后缀！ */
            background: url('bg.jpg.jpg') no-repeat center center fixed;
            
            background-size: cover;
            background-color: var(--bg-paper); 
            color: var(--ink);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 遮罩层：因为背景图本身很淡雅，我们只需要极淡的遮罩，稍微统一色调即可 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 极淡的青白色遮罩，保留背景的纹理和花卉细节 */
            background: rgba(245, 250, 245, 0.4); 
            z-index: -1;
            pointer-events: none;
        }

        /* ====== 2. 导航栏与艺术字 ====== */
        .navbar {
            height: 80px; /* 稍微加高一点以容纳艺术字 */
            background: rgba(255, 255, 255, 0.6); /* 更通透的磨砂玻璃 */
            border-bottom: 1px solid rgba(43, 58, 66, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            padding: 0 40px;
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        /* 左上角艺术字容器 */
        .nav-logo {
            position: absolute;
            left: 30px;
            display: flex;
            flex-direction: column; /* 或者是 row，看您喜欢 */
            cursor: pointer;
            text-decoration: none;
        }

        /* "长川遗韵" */
        .logo-main {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.2rem;
            color: #2c3e50; /* 深青墨色 */
            line-height: 1;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
            letter-spacing: 2px;
        }

        /* "寸指传薪" */
        .logo-sub {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.1rem;
            color: var(--accent); /* 朱红色印章感 */
            margin-top: 2px;
            margin-left: 4px;
            letter-spacing: 4px;
            opacity: 0.9;
        }

        .view-switcher { display: flex; gap: 20px; }

        .view-btn {
            font-family: 'Ma Shan Zheng';
            font-size: 1.3rem;
            padding: 8px 16px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            color: #555;
            text-decoration: none;
            font-weight: bold;
        }
        .view-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .view-btn:hover { color: var(--accent); }

        /* ====== 3. 主舞台 ====== */
        .main-stage {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 视图1：转盘 --- */
        .wheel-container {
            width: 860px; height: 860px;
            position: absolute;
            border-radius: 50%;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s;
            opacity: 1;
            transform: scale(1);
            /* 极淡的圆形光晕，区分复杂的背景 */
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 65%);
        }
        .wheel-container.hidden { opacity: 0; pointer-events: none; transform: scale(0.8); }

        .orbit-ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px dashed rgba(43, 58, 66, 0.2); /* 虚线颜色加深 */
            border-radius: 50%; pointer-events: none;
        }
        .orbit-label {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            font-family: 'Ma Shan Zheng'; font-size: 1rem; color: var(--accent);
            text-shadow: 0 0 5px #fff; font-weight: bold;
        }

        .center-island {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 130px;
            background: #fff;
            border-radius: 50%;
            border: 3px double var(--accent);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            cursor: pointer; transition: all 0.3s;
        }
        .center-island:hover { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 8px 30px rgba(142, 43, 43, 0.3); }
        .center-title { font-family: 'Ma Shan Zheng'; font-size: 1.8rem; text-align: center; line-height: 1.1; color: var(--accent); }
        .center-subtitle { font-size: 0.7rem; color: #666; margin-top: 4px; }

        .sector-node {
            position: absolute; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; width: 60px; z-index: 10;
        }
        .sector-node:hover .sector-icon { transform: scale(1.2); box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .sector-icon {
            width: 36px; height: 36px; border-radius: 50%; color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 0.9rem; border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: all 0.3s;
        }
        .sector-label { margin-top: 5px; font-size: 0.8rem; font-weight: bold; text-shadow: 0 0 3px #fff; white-space: nowrap; color: #333; }

        .item-node {
            position: absolute; width: 38px; height: 38px; border-radius: 50%;
            background-color: #e0e0e0; background-size: cover; background-position: center;
            cursor: pointer; transform: translate(-50%, -50%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .item-node:hover { transform: translate(-50%, -50%) scale(2.8); z-index: 100; border-color: var(--accent) !important; }
        .item-node.has-3d::after { content: ''; position: absolute; top:-4px; left:-4px; right:-4px; bottom:-4px; border-radius: 50%; border: 2px solid gold; animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .tooltip { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; opacity: 0; pointer-events: none; white-space: nowrap; }
        .item-node:hover .tooltip { opacity: 1; bottom: -28px; }


        /* --- 视图2：传承脉络 (长卷风格) --- */
        .timeline-container {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            overflow-y: auto; padding: 0;
            opacity: 0; pointer-events: none; transition: opacity 0.5s;
            display: flex; justify-content: center; align-items: flex-start;
        }
        .timeline-container.active { opacity: 1; pointer-events: auto; }

        .timeline-wrapper {
            position: relative; width: 800px;
            min-height: 100%; /* 确保铺满全屏 */
            padding-top: 80px; padding-bottom: 120px;
            background: rgba(255, 255, 255, 0.7); /* 半透明白色，透出背景 */
            border-left: 1px solid rgba(255,255,255,0.5);
            border-right: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }
        .timeline-line {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 4px;
            background: url('data:image/svg+xml;utf8,<svg width="4" height="10" viewBox="0 0 4 10" xmlns="http://www.w3.org/2000/svg"><rect width="4" height="6" fill="%23c0392b" opacity="0.6"/></svg>') repeat-y;
            transform: translateX(-2px); z-index: 0;
        }
        .timeline-item { position: relative; margin: 50px 0; width: 50%; padding: 0 40px; box-sizing: border-box; z-index: 1; }
        .timeline-item:nth-child(odd) { left: 0; text-align: right; }
        .timeline-item:nth-child(even) { left: 50%; text-align: left; }
        .timeline-dot {
            position: absolute; top: 20px; width: 20px; height: 20px;
            background: #fff; border: 4px solid var(--accent); border-radius: 50%;
            z-index: 10; transition: transform 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .timeline-item:nth-child(odd) .timeline-dot { right: -10px; }
        .timeline-item:nth-child(even) .timeline-dot { left: -10px; }
        .timeline-item:hover .timeline-dot { transform: scale(1.5); background: var(--accent); }
        .timeline-content {
            background: rgba(255,255,255,0.95); padding: 25px;
            border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 5px solid var(--accent); transition: transform 0.3s; cursor: pointer;
        }
        .timeline-item:nth-child(even) .timeline-content { border-left: none; border-right: 5px solid var(--accent); }
        .timeline-item:hover .timeline-content { transform: translateY(-5px); background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }

        .t-time { font-family: 'Ma Shan Zheng'; font-size: 1.4rem; color: var(--accent); margin-bottom: 5px; }
        .t-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #2b3a42; }
        .t-desc { font-size: 0.9rem; color: #555; line-height: 1.6; }


        /* --- 弹窗与覆盖层 --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal.open { display: flex; animation: slideUp 0.4s ease; }
        .modal-card {
            width: 700px; height: 450px; background: #fff;
            display: flex; border-radius: 4px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .m-img { width: 40%; background: #eee center/cover; }
        .m-info { width: 60%; padding: 40px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .m-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; }
        .badge { display: inline-block; padding: 3px 8px; color: white; border-radius: 4px; font-size: 12px; margin-right: 5px; margin-bottom: 15px;}
        .jump-btn {
            margin-top: auto; padding: 10px 20px; background: var(--accent); color: white; border: none;
            font-family: 'Ma Shan Zheng'; font-size: 1.2rem; cursor: pointer; align-self: flex-start;
            transition: transform 0.2s; box-shadow: 0 4px 10px rgba(142, 43, 43, 0.3);
        }
        .jump-btn:hover { transform: scale(1.05); }

        .scene-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300; display: none; flex-direction: column;
        }
        .scene-overlay.active { display: flex; animation: fadeIn 0.5s ease; }
        .scene-back-btn {
            position: absolute; top: 20px; left: 20px;
            padding: 10px 25px; background: rgba(255, 255, 255, 0.9);
            border: 2px solid var(--accent); border-radius: 30px;
            cursor: pointer; font-family: 'Ma Shan Zheng'; font-size: 1.2rem; color: var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 310;
            display: flex; align-items: center; gap: 8px; transition: all 0.3s;
        }
        .scene-back-btn:hover { background: var(--accent); color: white; box-shadow: 0 6px 20px rgba(169, 50, 38, 0.4); }
        .scene-iframe { flex: 1; width: 100%; height: 100%; border: none; background: #111; }

        @keyframes slideUp { from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);} }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

    </style>
</head>
<body>

    <nav class="navbar">
        <!-- 修改：左上角艺术字 -->
        <div class="nav-logo" onclick="location.reload()">
            <span class="logo-main">长川遗韵</span>
            <span class="logo-sub">· 寸指传薪</span>
        </div>

        <div class="view-switcher">
            <div class="view-btn active" onclick="switchView('category')" id="btn-cat">申报类别</div>
            <div class="view-btn" onclick="switchView('region')" id="btn-reg">申报地区</div>
            <div class="view-btn" onclick="switchView('ethnic')" id="btn-eth">传承民族</div>
            <div class="view-btn" onclick="switchView('lineage')" id="btn-lin">传承脉络</div>
        </div>
    </nav>

    <div class="main-stage">
        <!-- 视图容器：转盘 -->
        <div class="wheel-container" id="wheelView">
            <div class="center-island" onclick="resetFilter()">
                <div class="center-title" id="centerText">非遗<br>图谱</div>
                <div class="center-subtitle">点击重置</div>
            </div>
            <!-- JS生成内容 -->
        </div>

        <!-- 视图容器：传承脉络 (时间轴) -->
        <div class="timeline-container" id="timelineView">
            <div class="timeline-wrapper" id="timelineContent">
                <div class="timeline-line"></div>
                <!-- JS生成时间轴节点 -->
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-card">
            <div class="m-img" id="mImg"></div>
            <div class="m-info">
                <div class="m-close" onclick="closeModal()">×</div>
                <h2 id="mName" style="font-family:'Ma Shan Zheng';font-size:2.4rem;margin-bottom:10px;">标题</h2>
                <div id="mTags"></div>
                <p id="mDesc" style="line-height:1.6;color:#555;">描述内容...</p>
                <button class="jump-btn" id="mJump" style="display:none">进入交互场景 &rarr;</button>
            </div>
        </div>
    </div>

    <!-- 粒子场景覆盖层 (包含返回按钮) -->
    <div class="scene-overlay" id="sceneOverlay">
        <div class="scene-back-btn" onclick="closeScene()">
            <span>&larr;</span> 返回图谱
        </div>
        <iframe id="sceneFrame" class="scene-iframe" src=""></iframe>
    </div>

    <script>
        // ================= 1. 数据准备 =================
        
        // --- 传承脉络数据 (根据《传统项目发展脉络表》完整录入) ---
        const lineageData = [
            // === 远古时期 ===
            { t: "远古时期", n: "口簧 (口弦琴)", d: "新石器时代已有考古发现，清代列为宫廷乐器，是古老的泛世界乐器。" },
            { t: "远古时期", n: "蒙古族长调民歌", d: "起源于草原游牧生活，元代成为宫廷礼仪一部分，清代广泛流传，2005年入选人类非遗。" },
            { t: "远古时期", n: "蒙古族呼麦", d: "古代狩猎时模仿自然的喉音艺术，元代有记载，20世纪未经挖掘走向世界。" },
            { t: "远古时期", n: "蒙古族搏克", d: "可追溯至匈奴数，元代用于军队训练，清代形成完整体系，是那达慕核心。" },
            { t: "远古时期", n: "皮艺 (蒙古族皮艺)", d: "起源于游牧生活的皮具制作，元、清时期因军备和宫廷需求技艺精进。" },
            { t: "远古时期", n: "蒙古族勒勒车制作技艺", d: "适应草原运输的古老发明，制造传统延续数千年，被誉为“草原之舟”。" },
            { t: "远古时期", n: "弓箭制作技艺 (蒙古族牛角弓)", d: "最早可追溯至匈奴时期，元代因军事达顶峰，明清后主要用于那达慕竞技。" },
            { t: "远古时期", n: "蒙古族马具制作技艺", d: "春秋战国出现马具雏形，元代功能完备，清代装饰华丽并与礼仪结合。" },
            { t: "远古时期", n: "桦树皮制作技艺", d: "北方森林狩猎民族适应环境的古老技艺，纹饰具原始宗教色彩。" },
            { t: "远古时期", n: "鄂伦春族狍皮制作技艺", d: "源于森林狩猎生存智慧，形成一整套从鞣制到成衣的技艺。" },
            { t: "远古时期", n: "蒙医药 (蒙医乌拉灸术)", d: "蒙医最古老疗法之一，源于北方民族灸熨经验，清代与佛教医学结合后更规范。" },
            { t: "远古时期", n: "蒙医药 (蒙医传统正骨术)", d: "起源于古代骑兵伤科实践，《蒙古秘史》有记载，清代经名医系统理论化。" },
            { t: "远古时期", n: "达斡尔族鲁日格勒舞", d: "起源于达斡尔族狩猎生活，围绕篝火的集体舞蹈。" },
            { t: "远古时期", n: "蒙古族服饰", d: "为适应游牧生活形成的基本形制自古有之，元、清两代在面料、纹饰上极大丰富。" },
            { t: "远古时期", n: "祭敖包", d: "源于远古的自然崇拜和祖先祭祀，后与藏传佛教仪式融合，清代规范化。" },
            { t: "远古时期", n: "鄂温克驯鹿习俗", d: "与鄂温克族（使鹿部）生计方式共生，是其森林文化的核心。" },
            { t: "远古时期", n: "蒙古族养驼习俗", d: "在戈壁草原形成的一套关于骆驼选育、放牧、利用的完整知识与文化。" },

            // === 秦汉时期 ===
            { t: "秦汉时期", n: "蒙古包营造技艺", d: "起源于匈奴的“穹庐”，元代形制标准化，清代技艺完全成熟。" },
            { t: "秦汉时期", n: "冒顿潮尔 (胡笳)", d: "产生于秦汉，唐代流行，清代后濒危，20世纪末重新挖掘。" },

            // === 元代 ===
            { t: "元代", n: "格萨(斯)尔", d: "史诗随藏传佛教传入蒙古地区并本土化，清代已有抄本。" },
            { t: "元代", n: "蒙古族四胡音乐", d: "前身为契丹奚琴，元代流传，清代用于宫廷，近现代成为乌力格尔、好来宝的主要伴奏。" },
            { t: "元代", n: "潮尔道 (蒙古族合声演唱)", d: "起源于蒙元时期，明末清初达鼎盛，用于宫廷、寺庙等庄严场合。" },
            { t: "元代", n: "阿斯尔 (蒙古族宫廷器乐)", d: "起源于成吉思汗时期，元代成为宫廷宴乐，清代在察哈尔流行后传入民间。" },
            { t: "元代", n: "鄂尔多斯短调民歌", d: "风格形成可上溯到元代，在鄂尔多斯蒙汉杂居区融合形成，节奏明快。" },
            { t: "元代", n: "鄂尔多斯古如歌", d: "起源于蒙古汗国宫廷歌曲，清代后在鄂尔多斯杭锦旗传承，被称为“蒙古音乐活化石”。" },
            { t: "元代", n: "蒙古文书法", d: "随回鹘式蒙古文使用而出现，元代用于官方文书，清代在寺院书写中达艺术高峰。" },

        function switchView(mode) {
            currentMode = mode;
            activeFilter = null;

            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            if(mode === 'category') document.getElementById('btn-cat').classList.add('active');
            if(mode === 'region') document.getElementById('btn-reg').classList.add('active');
            if(mode === 'ethnic') document.getElementById('btn-eth').classList.add('active');
            if(mode === 'lineage') document.getElementById('btn-lin').classList.add('active');

            const wheelEl = document.getElementById('wheelView');
            const timelineEl = document.getElementById('timelineView');

            if (mode === 'lineage') {
                wheelEl.classList.add('hidden');
                timelineEl.classList.add('active');
                renderTimeline();
            } else {
                timelineEl.classList.remove('active');
                wheelEl.classList.remove('hidden');
                updateCenterText();
                renderWheel();
            }
        }

        function updateCenterText() {
            let txt = '';
            if(activeFilter) {
               txt = activeFilter;
               if(config.e[activeFilter]) txt = config.e[activeFilter].label;
            } else {
               if(currentMode === 'category') txt = '非遗<br>类别';
               if(currentMode === 'region') txt = '申报<br>地区';
               if(currentMode === 'ethnic') txt = '传承<br>民族';
            }
            document.getElementById('centerText').innerHTML = txt;
        }

        function resetFilter() {
            activeFilter = null;
            updateCenterText();
            renderWheel();
        }

        function renderWheel() {
            const container = document.getElementById('wheelView');
            Array.from(container.children).forEach(child => {
                if(!child.classList.contains('center-island')) container.removeChild(child);
            });

            // 年轮
            for(let yr in radiusMap) {
                let r = radiusMap[yr];
                let ring = document.createElement('div');
                ring.className = 'orbit-ring';
                ring.style.width = (r*2)+'px'; ring.style.height = (r*2)+'px';
                if(!activeFilter) {
                    let lbl = document.createElement('div');
                    lbl.className = 'orbit-label';
                    lbl.innerText = yr;
                    ring.appendChild(lbl);
                }
                container.appendChild(ring);
            }

            if(!activeFilter) {
                let groups = [];
                let colorMap = {};
                let labelMap = {};

                if(currentMode === 'category') {
                    groups = Object.keys(config.c);
                    colorMap = config.c;
                    groups.forEach(g => labelMap[g] = g);
                } else if (currentMode === 'region') {
                    groups = Object.keys(config.r);
                    colorMap = config.r;
                    groups.forEach(g => labelMap[g] = g);
                } else if (currentMode === 'ethnic') {
                    groups = Object.keys(config.e);
                    groups.forEach(k => {
                        colorMap[k] = config.e[k].color;
                        labelMap[k] = config.e[k].label;
                    });
                }

                const r_inner = 130; 
                const step = (Math.PI * 2) / groups.length;

                groups.forEach((g, i) => {
                    const angle = step * i - Math.PI/2;
                    const x = 430 + r_inner * Math.cos(angle);
                    const y = 430 + r_inner * Math.sin(angle);

                    const node = document.createElement('div');
                    node.className = 'sector-node';
                    node.style.left = x + 'px'; node.style.top = y + 'px';
                    
                    const col = colorMap[g];
                    const txt = labelMap[g];

                    node.innerHTML = `
                        <div class="sector-icon" style="background:${col}">${txt.charAt(0)}</div>
                        <div class="sector-label" style="color:${col}">${txt}</div>
                    `;
                    node.onclick = () => {
                        activeFilter = g;
                        updateCenterText();
                        renderWheel();
                    };
                    container.appendChild(node);
                });
            }

            let displayData = rawData;
            if(activeFilter) {
                if(currentMode === 'category') displayData = rawData.filter(d => d.c === activeFilter);
                if(currentMode === 'region') displayData = rawData.filter(d => d.r === activeFilter);
                if(currentMode === 'ethnic') displayData = rawData.filter(d => d.e === activeFilter);
            }

            let yearGroups = {};
            displayData.forEach(item => {
                if(!yearGroups[item.y]) yearGroups[item.y] = [];
                yearGroups[item.y].push(item);
            });

            for(let yr in yearGroups) {
                let items = yearGroups[yr];
                items.sort((a,b) => a.c.localeCompare(b.c));

                const r = radiusMap[yr] || 400;
                const total = items.length;
                const step = (Math.PI * 2) / total;
                const offset = activeFilter ? 0 : (yr % 2 * 0.5);

                items.forEach((item, i) => {
                    const angle = step * i + offset;
                    const x = 430 + r * Math.cos(angle);
                    const y = 430 + r * Math.sin(angle);

                    const node = document.createElement('div');
                    node.className = 'item-node';
                    
                    let borderColor = '#999';
                    if(currentMode === 'category') borderColor = config.c[item.c];
                    else if(currentMode === 'region') borderColor = config.r[item.r];
                    else if(currentMode === 'ethnic') borderColor = config.e[item.e].color;
                    
                    node.style.borderColor = borderColor;
                    node.style.left = x + 'px';
                    node.style.top = y + 'px';
                    node.style.backgroundImage = `url('${getImgUrl(item.n)}')`;

                    if(linkMap[item.n]) node.classList.add('has-3d');

                    let tip = document.createElement('div');
                    tip.className = 'tooltip';
                    tip.innerText = item.n;
                    node.appendChild(tip);

                    node.onclick = () => openModal(item, borderColor);

                    node.style.opacity = 0;
                    setTimeout(() => node.style.opacity = 1, i * 15 + (yr-2000)*10);

                    container.appendChild(node);
                });
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContent');
            Array.from(container.children).forEach(child => {
                if(!child.classList.contains('timeline-line')) container.removeChild(child);
            });

            lineageData.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'timeline-item';
                div.innerHTML = `
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="t-time">${item.t}</div>
                        <div class="t-title">${item.n}</div>
                        <div class="t-desc">${item.d}</div>
                    </div>
                `;
                div.style.opacity = 0;
                div.style.transform = i % 2 === 0 ? 'translateX(-30px)' : 'translateX(30px)';
                
                container.appendChild(div);

                setTimeout(() => {
                    div.style.transition = 'all 0.6s ease';
                    div.style.opacity = 1;
                    div.style.transform = 'translateX(0)';
                }, i * 200);
            });
        }


        // ================= 3. 弹窗与场景交互 =================
        const modal = document.getElementById('modal');
        const sceneOverlay = document.getElementById('sceneOverlay');
        const sceneFrame = document.getElementById('sceneFrame');
        
        function openModal(item, color) {
            // 1. 设置标题颜色和内容
            document.getElementById('mName').innerText = item.n;
            document.getElementById('mName').style.color = color;
            
            // 2. 生成标签 HTML
            let tagsHtml = `
                <span class="badge" style="background:#555">${item.y}年</span>
                <span class="badge" style="background:${config.c[item.c]}">${item.c}</span>
                <span class="badge" style="background:${config.r[item.r]}">${item.r}</span>
                <span class="badge" style="background:${config.e[item.e].color}">${config.e[item.e].label}</span>
            `;
            document.getElementById('mTags').innerHTML = tagsHtml;
            
            // 3. 设置描述文字
            document.getElementById('mDesc').innerText = `【${item.n}】是内蒙古地区珍贵的${item.c}类非物质文化遗产（${config.e[item.e].label}），申报地区为${item.r}。`;
            
            // ===============================================
            // 【关键修改】这里必须调用 getImgUrl 函数，
            // 否则弹窗还是会显示之前的随机图片！
            // ===============================================
            document.getElementById('mImg').style.backgroundImage = `url('${getImgUrl(item.n)}')`;
            
            // 4. 处理跳转按钮
            const btn = document.getElementById('mJump');
            if(linkMap[item.n]) {
                btn.style.display = 'block';
                btn.style.backgroundColor = color;
                btn.onclick = () => openScene(linkMap[item.n]);
            } else {
                btn.style.display = 'none';
            }

            // 5. 显示弹窗
            modal.classList.add('open');
        }

        function closeModal() {
            modal.classList.remove('open');
        }

        function openScene(url) {
            closeModal();
            sceneFrame.src = url; 
            sceneOverlay.classList.add('active');
        }

        function closeScene() {
            sceneOverlay.classList.remove('active');
            setTimeout(() => { sceneFrame.src = ''; }, 300);
        }

        switchView('category');

    </script>
